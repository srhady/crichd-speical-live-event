name: Auto Update Live Events M3U

on:
  workflow_dispatch: # cron-job.org থেকে কল করার জন্য

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Python Scraper
        run: |
          # আপনার পাইথন স্ক্রিপ্টের নাম যদি scraper.py হয়, তাহলে এটা রান করবে
          python scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Live_Events.m3u
          
          # যদি ফাইলে নতুন কোনো আপডেট থাকে, তবেই সেভ (commit) করবে
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-updated Live Events from CricHD"
          git push
