name: Auto Update Live Events M3U & JSON

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Clone Private Repository
        run: |
          git clone https://${{ secrets.GH_PAT }}@github.com/srhady/Sports.git private_repo

      - name: Run Python Scraper
        run: |
          python private_repo/crichd_event_scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Live_Events.m3u Live_Events.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-updated Live Events M3U & JSON"
          git push
