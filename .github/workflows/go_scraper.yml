name: Go CricHD Auto Update (M3U & JSON)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Public Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Clone Private Repository
        run: |
          # GH_PAT সিক্রেট ব্যবহার করে প্রাইভেট রিপো ক্লোন
          git clone https://${{ secrets.GH_PAT }}@github.com/srhady/Sports.git private_repo

      - name: Run Python Scraper
        run: |
          # নতুন ওয়েবসাইটের জন্য আপনার পাইথন স্ক্রিপ্ট রান করানো হচ্ছে
          # (স্ক্রিপ্টের নাম go_crichd_scraper.py ধরে নিলাম, আপনি চাইলে নাম পাল্টাতে পারেন)
          python private_repo/go_crichd_scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # ফাইলগুলো সরাসরি মেইন ফোল্ডারেই তৈরি হবে, তাই শুধু Add করলেই হবে
          git add Live_Events.m3u Live_Events.json
          
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-updated go.crichd.tv Live Events"
          git push
